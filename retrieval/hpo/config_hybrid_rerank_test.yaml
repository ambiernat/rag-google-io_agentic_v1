# ================================
# HPO: Hybrid + CrossEncoder Rerank
# ================================

experiment:
  name: "/Users/ambiernat@gmail.com/hybrid_rerank_hpo"
  tracking_uri: "databricks"
  n_trials: 2
  direction: "maximize"

data:
  ground_truth:
    dir: "data/eval/ground_truth"
    prefix: "gt_gpt-5-nano_paraphrased"
    results_dir: "data/eval/results/hpo"
  n_subsample: 30


retrieval:
  type: "hybrid"
  collection_name: "google-io-transcripts-hybrid"

  retrieve_k:
    choices: [20, 30]

reranker:
  type: "cross_encoder"

  rerank_k:
    choices: [5]

  models:
    - "cross-encoder/ms-marco-TinyBERT-L-2-v2"
    - "cross-encoder/ms-marco-MiniLM-L-6-v2"

objective:
  primary_metric: "recall@5"
  cost_penalty:
    enabled: true
    retrieve_k_weight: 0.1

compute:
  device: "cpu"          # cpu | cuda
  batch_size: 32

logging:
  level: "INFO"

artifacts:
  save_best_params: true
  save_best_results: true
  save_study_summary: true
